<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Straight Shot Database</title>
  <meta name="description" content="The Straight Shot Database">

  <!-- Google Analytics 4 -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-C44Q05HQQM"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-C44Q05HQQM');
  </script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f4f7f4;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      line-height: 1.6;
    }
    header {
      background: #2d7a3e;
      color: white;
      padding: 1.25rem 2rem;
      border-bottom: 4px solid #1e5a2e;
    }
    header .wordmark {
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
    }
    .card {
      max-width: 640px;
      width: 100%;
      text-align: center;
    }
    h1 {
      font-size: 2.25rem;
      margin-bottom: 1.25rem;
      color: #2d7a3e;
      font-weight: 700;
      line-height: 1.2;
    }
    .lede {
      font-size: 1.1rem;
      color: #4a4a4a;
      margin-bottom: 2.25rem;
      max-width: 520px;
      margin-left: auto;
      margin-right: auto;
    }
    .lede a {
      color: #2d7a3e;
      text-decoration: underline;
    }
    .lede a:hover {
      color: #1e5a2e;
    }
    .button {
      display: inline-block;
      background: #2d7a3e;
      color: white;
      padding: 0.95rem 2.25rem;
      font-size: 1.05rem;
      font-weight: 600;
      text-decoration: none;
      border-radius: 6px;
      transition: background 0.15s ease;
      border: 2px solid #2d7a3e;
    }
    .button:hover {
      background: #1e5a2e;
      border-color: #1e5a2e;
    }
    footer {
      background: #e8efe8;
      padding: 1.5rem 2rem;
      text-align: center;
      font-size: 0.85rem;
      color: #6a6a6a;
      border-top: 1px solid #d4ddd4;
    }
    footer a {
      color: #2d7a3e;
      text-decoration: none;
    }
    footer a:hover {
      text-decoration: underline;
    }
    @media (max-width: 600px) {
      h1 { font-size: 1.75rem; }
      .lede { font-size: 1rem; }
      header { padding: 1rem 1.25rem; }
      main { padding: 2rem 1.25rem; }
    }
  </style>
</head>
<body>
  <header>
    <div class="wordmark">The Straight Shot Database</div>
  </header>
  <main>
    <div class="card">
      <h1>The Straight Shot Database</h1>
      <p class="lede">
        from the <a href="https://www.cspi.org/thestraightshot">Center for Science in the Public Interest</a>
      </p>
      <a class="button" href="https://apps.knack.com/thestraightshot/tss/home-page">
        Open the Database
      </a>
    </div>
  </main>
  <footer>
    &copy; <span id="year"></span> The Straight Shot Database
  </footer>
  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
